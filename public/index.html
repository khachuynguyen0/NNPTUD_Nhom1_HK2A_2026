<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Spa - Quản Lý Tiệm Spa</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">🌸</div>
    <h1>Loan Spa</h1>
    <p>Hệ thống quản lý tiệm spa</p>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="card-grid">

      <div class="card">
        <div class="card-icon">📂</div>
        <h2>Danh Mục</h2>
        <p>Quản lý danh mục dịch vụ</p>
      </div>

      <div class="card">
        <div class="card-icon">💆</div>
        <h2>Dịch Vụ</h2>
        <p>Quản lý các dịch vụ spa</p>
      </div>

      <div class="card">
        <div class="card-icon">👥</div>
        <h2>Nhân Viên</h2>
        <p>Quản lý tài khoản nhân viên</p>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>🌸 Loan Spa &copy; 2026</p>
  </footer>

</body>

</html>
