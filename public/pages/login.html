<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Spa - Đăng Nhập</title>
    <link rel="stylesheet" href="/css/style.css" />
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            border: 1px solid #fce4ec;
            box-shadow: 0 6px 20px rgba(194, 24, 91, 0.08);
        }
        .auth-container h2 {
            text-align: center;
            color: #c2185b;
            margin-bottom: 28px;
            font-size: 1.5rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
        .auth-footer a {
            color: #c2185b;
            text-decoration: none;
            font-weight: 600;
        }
        /* Duong phan cach giua form va google */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #fce4ec;
        }
        .divider span {
            color: #aaa;
            font-size: 0.82rem;
        }
        /* Wrapper can chinh nut Google vao giua */
        .google-btn-wrapper {
            display: flex;
            justify-content: center;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo"><img src="/images/logo_loan_Spa.png" alt="Logo"></div>
        <h1>Loan Spa</h1>
        <span class="tagline">Hệ thống quản lý tiệm spa</span>
    </header>

    <!-- Nav -->
    <nav class="nav">
        <a href="/" class="nav-link">🏠 Trang Chủ</a>
        <a href="/pages/services.html" class="nav-link">💆 Dịch Vụ</a>
        <a href="/pages/booking.html" class="nav-link">📅 Đặt Lịch</a>
        <div id="authNav"></div>
    </nav>

    <!-- Main -->
    <main class="main">

        <div id="alert" class="alert"></div>

        <div class="auth-container">
            <h2>🔐 Đăng Nhập</h2>

            <!-- Form dang nhap thuong -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="VD: admin" required autocomplete="username" />
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required autocomplete="current-password" />
                </div>

                <div class="form-actions" style="margin-top: 24px;">
                    <button type="submit" class="btn" id="btnLogin" style="width: 100%;">Đăng Nhập</button>
                </div>
            </form>

            <!-- Duong ke "hoac" -->
            <div class="divider"><span>hoặc</span></div>

            <!-- Nut dang nhap Google (render tu Google GSI SDK) -->
            <div class="google-btn-wrapper">
                <div id="g_id_onload"
                    data-client_id="327799824684-sp6ptted0kjnmk3korvijfb9dddt64bs.apps.googleusercontent.com"
                    data-callback="handleGoogleLogin"
                    data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                    data-type="standard"
                    data-size="large"
                    data-theme="outline"
                    data-text="signin_with"
                    data-shape="rectangular"
                    data-logo_alignment="left"
                    data-width="340">
                </div>
            </div>

            <div class="auth-footer" style="margin-top: 20px;">
                Chưa có tài khoản? <a href="/pages/register.html">Đăng Ký</a>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>🌸 Loan Spa &copy; 2026</p>
    </footer>

    <script src="/js/api.js"></script>
    <script>
        // Neu da dang nhap roi thi chuyen thang ve trang truoc
        if (isLoggedIn()) {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('redirect') || '/';
        }

        renderAuthNav();

        function showAlert(type, msg) {
            const el = document.getElementById('alert');
            el.className = 'alert show alert-' + type;
            el.textContent = msg;
            setTimeout(() => { el.className = 'alert'; }, 4000);
        }

        // Ham luu thong tin dang nhap va chuyen trang
        function saveLoginAndRedirect(data) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('role', data.role);
            localStorage.setItem('username', data.username);
            localStorage.setItem('userId', data.userId);

            showAlert('success', '✅ Đăng nhập thành công! Đang chuyển trang...');

            setTimeout(() => {
                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('redirect') || '/';
            }, 1000);
        }

        // ========== DANG NHAP THUONG ==========
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const data = await callApi('POST', '/api/auth/login', { username, password });
                saveLoginAndRedirect(data);
            } catch (err) {
                console.error('[Login] loi:', err.message);
                showAlert('error', '❌ ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Đăng Nhập';
            }
        }

        // ========== DANG NHAP BANG GOOGLE ==========
        // Ham nay duoc Google GSI goi lai sau khi user chon tai khoan Google
        async function handleGoogleLogin(googleResponse) {
            try {
                console.log('[GoogleLogin] Nhan duoc credential tu Google, dang gui len server...');

                // Gui credential (idToken) len backend de verify
                const data = await callApi('POST', '/api/auth/google', {
                    credential: googleResponse.credential
                });

                saveLoginAndRedirect(data);
            } catch (err) {
                console.error('[GoogleLogin] loi:', err.message);
                showAlert('error', '❌ Đăng nhập Google thất bại: ' + err.message);
            }
        }
    </script>

</body>

</html>
