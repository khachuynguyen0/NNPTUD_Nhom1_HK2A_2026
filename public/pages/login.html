<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Spa - Đăng Nhập</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            border: 1px solid #fce4ec;
            box-shadow: 0 6px 20px rgba(194, 24, 91, 0.08);
        }
        .auth-container h2 {
            text-align: center;
            color: #c2185b;
            margin-bottom: 28px;
            font-size: 1.5rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
        .auth-footer a {
            color: #c2185b;
            text-decoration: none;
            font-weight: 600;
        }
        /* Phan cach giua cac phuong thuc dang nhap */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: #aaa;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        /* Nut dang nhap Google */
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px 20px;
            border: 1.5px solid #dadce0;
            border-radius: 8px;
            background: white;
            color: #3c4043;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-google:hover {
            background: #f8f8f8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo"><img src="/images/logo_loan_Spa.png" alt="Logo"></div>
        <h1>Loan Spa</h1>
        <span class="tagline">Hệ thống quản lý tiệm spa</span>
    </header>

    <!-- Nav -->
    <nav class="nav">
        <a href="/" class="nav-link">🏠 Trang Chủ</a>
        <a href="/pages/services.html" class="nav-link">💆 Dịch Vụ</a>
        <a href="/pages/booking.html" class="nav-link">📅 Đặt Lịch</a>
        <div id="authNav"></div>
    </nav>

    <!-- Main -->
    <main class="main">

        <div id="alert" class="alert"></div>

        <div class="auth-container">
            <h2>🔐 Đăng Nhập</h2>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="username" placeholder="VD: admin" required autocomplete="username" />
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required autocomplete="current-password" />
                </div>

                <div class="form-actions" style="margin-top: 24px;">
                    <button type="submit" class="btn" id="btnLogin" style="width: 100%;">Đăng Nhập</button>
                </div>
            </form>

            <!-- Phan cach -->
            <div class="divider">hoặc</div>

            <!-- Nut dang nhap Google se duoc SDK render thang vao the div nay -->
            <div id="googleBtnWrapper" style="margin-top:20px;display:flex;justify-content:center">
                <!-- Fallback neu chua load -->
                <button class="btn-google" id="btnGoogle" style="opacity:0.6;cursor:not-allowed">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
                    Đang tải Google...
                </button>
            </div>
            <p id="googleNote" style="display:none;text-align:center;font-size:0.8rem;color:#aaa;margin-top:8px">
                ⚠️ Chưa cấu hình Google Client ID
            </p>

            <div class="auth-footer">
                Chưa có tài khoản? <a href="/pages/register.html">Đăng Ký</a>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>🌸 Loan Spa &copy; 2026</p>
    </footer>

    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="/js/api.js"></script>
    <script>
        // Neu da dang nhap roi thi chuyen thang ve trang truoc
        if (isLoggedIn()) {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('redirect') || '/';
        }

        renderAuthNav();

        // Hien thi thong bao
        function showAlert(type, msg) {
            const el = document.getElementById('alert');
            el.className = 'alert show alert-' + type;
            el.textContent = msg;
            setTimeout(() => { el.className = 'alert'; }, 3500);
        }

        // Dang nhap bang username + password
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const data = await callApi('POST', '/api/auth/login', { username, password });

                // Luu thong tin vao localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userId', data.userId);

                showAlert('success', '✅ Đăng nhập thành công! Đang chuyển trang...');

                setTimeout(() => {
                    const params = new URLSearchParams(window.location.search);
                    window.location.href = params.get('redirect') || '/';
                }, 1000);

            } catch (err) {
                console.error('[Login] loi:', err.message);
                showAlert('error', '❌ ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Đăng Nhập';
            }
        }

        // Xu ly sau khi Google tra ve credential
        async function onGoogleCredential(response) {
            try {
                const data = await callApi('POST', '/api/auth/google', { credential: response.credential });

                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', data.username || '');
                localStorage.setItem('userId', data.userId);

                showAlert('success', '✅ Đăng nhập Google thành công!');
                setTimeout(() => {
                    const params = new URLSearchParams(window.location.search);
                    window.location.href = params.get('redirect') || '/';
                }, 1000);
            } catch (err) {
                console.error('[GoogleLogin] loi:', err.message);
                showAlert('error', '❌ ' + err.message);
            }
        }

        // Bat dau luong Google One Tap
        function setupGoogleSignIn(clientId) {
            if (typeof google === 'undefined' || !google.accounts) return;

            google.accounts.id.initialize({
                client_id: clientId,
                callback: onGoogleCredential
            });

            // Ghi de nut custom bang nut chuan cua Google de dam bao ty le hoat dong 100%
            google.accounts.id.renderButton(
                document.getElementById("googleBtnWrapper"),
                { theme: "outline", size: "large", width: "100%", text: "signin_with" }
            );
            
            // Xoa cai nut fake cu di
            const btnFake = document.getElementById('btnGoogle');
            if (btnFake) btnFake.style.display = 'none';
        }

        // Doc GOOGLE_CLIENT_ID tu server va inject vao meta tag, sau do init nut Google
        fetch('/api/auth/google-client-id')
            .then(r => r.json())
            .then(data => {
                if (data.clientId) {
                    const meta = document.createElement('meta');
                    meta.name = 'google-client-id';
                    meta.content = data.clientId;
                    document.head.appendChild(meta);
                    
                    // Render button lun sau khi fetch dc meta dt
                    setTimeout(() => setupGoogleSignIn(data.clientId), 200);
                } else {
                    document.getElementById('googleNote').style.display = 'block';
                    const btnFake = document.getElementById('btnGoogle');
                    if (btnFake) btnFake.innerHTML = '⚠️ Button bị vô hiệu (Thiếu Client ID)';
                }
            })
            .catch(() => {
                document.getElementById('googleNote').style.display = 'block';
            });
    </script>

</body>

</html>
