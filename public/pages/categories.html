<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Mục | NNPTUD Nhóm 1</title>
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <header class="header">
        <div class="container">
            <h1>📂 Quản Lý Danh Mục</h1>
        </div>
    </header>
    <nav class="nav">
        <div class="container">
            <a href="/index.html" class="nav-link">🏠 Trang Chủ</a>
            <a href="/pages/categories.html" class="nav-link active">📂 Danh Mục</a>
            <a href="/pages/products.html" class="nav-link">📦 Sản Phẩm</a>
            <a href="/pages/users.html" class="nav-link">👥 Người Dùng</a>
        </div>
    </nav>

    <main class="container main">
        <h2 class="page-title">📂 Danh Mục</h2>

        <!-- Thong bao -->
        <div id="message" class="message"></div>

        <!-- Form them / sua -->
        <div class="form-box">
            <h3 id="formTitle">➕ Thêm Danh Mục Mới</h3>
            <input type="hidden" id="editId" />
            <div class="form-group">
                <input type="text" id="name" placeholder="Tên danh mục *" />
                <input type="text" id="description" placeholder="Mô tả" />
                <button class="btn btn-primary" onclick="submitForm()">Lưu</button>
                <button class="btn" onclick="resetForm()" style="background:#95a5a6;color:white;">Hủy</button>
            </div>
        </div>

        <!-- Bang danh sach -->
        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Tên Danh Mục</th>
                        <th>Mô Tả</th>
                        <th>Ngày Tạo</th>
                        <th>Hành Động</th>
                    </tr>
                </thead>
                <tbody id="categoryList">
                    <tr>
                        <td colspan="5" style="text-align:center;color:#888">Đang tải...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <p>NNPTUD Nhóm 1 - HK2A 2026</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/categories.js"></script>
</body>

</html>
