<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Spa - Đăng Ký</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            border: 1px solid #fce4ec;
            box-shadow: 0 6px 20px rgba(194, 24, 91, 0.08);
        }
        .auth-container h2 {
            text-align: center;
            color: #c2185b;
            margin-bottom: 28px;
            font-size: 1.5rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
        .auth-footer a {
            color: #c2185b;
            text-decoration: none;
            font-weight: 600;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: #aaa;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px 20px;
            border: 1.5px solid #dadce0;
            border-radius: 8px;
            background: white;
            color: #3c4043;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-google:hover {
            background: #f8f8f8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo"><img src="/images/logo_loan_Spa.png" alt="Logo"></div>
        <h1>Loan Spa</h1>
        <span class="tagline">Hệ thống quản lý tiệm spa</span>
    </header>

    <!-- Nav -->
    <nav class="nav">
        <a href="/" class="nav-link">🏠 Trang Chủ</a>
        <a href="/pages/services.html" class="nav-link">💆 Dịch Vụ</a>
        <a href="/pages/booking.html" class="nav-link">📅 Đặt Lịch</a>
        <div id="authNav"></div>
    </nav>

    <!-- Main -->
    <main class="main">

        <div id="alert" class="alert"></div>

        <div class="auth-container">
            <h2>📝 Đăng Ký</h2>

            <!-- Dang ky nhanh bang Google (dat tren cung) -->
            <div id="googleBtnWrapper">
                <button class="btn-google" id="btnGoogleReg" onclick="handleGoogleRegister()">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
                    Đăng Ký / Đăng Nhập bằng Google
                </button>
                <p id="googleNote" style="display:none;text-align:center;font-size:0.8rem;color:#aaa;margin-top:8px">
                    ⚠️ Chưa cấu hình Google Client ID
                </p>
            </div>

            <div class="divider">hoặc đăng ký bằng email</div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Tên đăng nhập *</label>
                    <input type="text" id="username" placeholder="VD: nguyen_van_a" required autocomplete="username" />
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="VD: email@gmail.com" required autocomplete="email" />
                </div>

                <div class="form-group">
                    <label>Mật khẩu *</label>
                    <input type="password" id="password" placeholder="Ít nhất 6 ký tự" required autocomplete="new-password" />
                </div>

                <div class="form-group">
                    <label>Xác nhận mật khẩu *</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required autocomplete="new-password" />
                </div>

                <div class="form-actions" style="margin-top: 24px;">
                    <button type="submit" class="btn" id="btnRegister" style="width: 100%;">Đăng Ký</button>
                </div>
            </form>

            <div class="auth-footer">
                Đã có tài khoản? <a href="/pages/login.html">Đăng Nhập</a>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>🌸 Loan Spa &copy; 2026</p>
    </footer>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="/js/api.js"></script>
    <script>
        renderAuthNav();

        function showAlert(type, msg) {
            const el = document.getElementById('alert');
            el.className = 'alert show alert-' + type;
            el.textContent = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { el.className = 'alert'; }, 4000);
        }

        // Xu ly sau khi Google tra ve credential (dang ky / dang nhap google)
        async function onGoogleCredential(response) {
            try {
                const data = await callApi('POST', '/api/auth/google', { credential: response.credential });

                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('username', data.username || '');
                localStorage.setItem('userId', data.userId);

                showAlert('success', '✅ Thành công! Đang chuyển trang...');
                setTimeout(() => { window.location.href = '/'; }, 1000);
            } catch (err) {
                console.error('[GoogleRegister] loi:', err.message);
                showAlert('error', '❌ ' + err.message);
            }
        }

        // Bat dau dang ky bang Google
        function handleGoogleRegister() {
            if (typeof google === 'undefined' || !google.accounts) {
                showAlert('error', '⚠️ Google SDK chưa tải xong, vui lòng chờ giây lát');
                return;
            }
            const clientId = document.querySelector('meta[name="google-client-id"]')?.content;
            if (!clientId) {
                document.getElementById('googleNote').style.display = 'block';
                showAlert('error', '⚠️ Chưa cấu hình GOOGLE_CLIENT_ID trong .env');
                return;
            }
            google.accounts.id.initialize({ client_id: clientId, callback: onGoogleCredential });
            google.accounts.id.prompt();
        }

        // Dang ky bang username + password
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('btnRegister');
            btn.disabled = true;
            btn.textContent = 'Đang đăng ký...';

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('error', '❌ Mật khẩu xác nhận không khớp!');
                btn.disabled = false;
                btn.textContent = 'Đăng Ký';
                return;
            }

            if (password.length < 6) {
                showAlert('error', '❌ Mật khẩu phải có ít nhất 6 ký tự!');
                btn.disabled = false;
                btn.textContent = 'Đăng Ký';
                return;
            }

            try {
                await callApi('POST', '/api/auth/register', { username, email, password });
                showAlert('success', '✅ Đăng ký thành công! Đang chuyển về đăng nhập...');
                setTimeout(() => { window.location.href = '/pages/login.html'; }, 1500);
            } catch (err) {
                console.error('[Register] loi:', err.message);
                showAlert('error', '❌ ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Đăng Ký';
            }
        }

        // Doc GOOGLE_CLIENT_ID tu server
        fetch('/api/auth/google-client-id')
            .then(r => r.json())
            .then(data => {
                if (data.clientId) {
                    const meta = document.createElement('meta');
                    meta.name = 'google-client-id';
                    meta.content = data.clientId;
                    document.head.appendChild(meta);
                } else {
                    document.getElementById('googleNote').style.display = 'block';
                }
            })
            .catch(() => {
                document.getElementById('googleNote').style.display = 'block';
            });
    </script>

</body>

</html>
