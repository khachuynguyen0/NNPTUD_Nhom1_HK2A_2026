<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Spa - Đăng Ký</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .auth-container {
            max-width: 420px;
            margin: 60px auto;
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            border: 1px solid #fce4ec;
            box-shadow: 0 6px 20px rgba(194, 24, 91, 0.08);
        }
        .auth-container h2 {
            text-align: center;
            color: #c2185b;
            margin-bottom: 28px;
            font-size: 1.5rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
        .auth-footer a {
            color: #c2185b;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="logo"><img src="/images/logo_loan_Spa.png" alt="Logo"></div>
        <h1>Loan Spa</h1>
        <span class="tagline">Hệ thống quản lý tiệm spa</span>
    </header>

    <!-- Nav -->
    <nav class="nav">
        <a href="/" class="nav-link">🏠 Trang Chủ</a>
        <a href="/pages/services.html" class="nav-link">💆 Dịch Vụ</a>
        <a href="/pages/booking.html" class="nav-link">📅 Đặt Lịch</a>
        <div id="authNav"></div>
    </nav>

    <!-- Main -->
    <main class="main">

        <div id="alert" class="alert"></div>

        <div class="auth-container">
            <h2>📝 Đăng Ký</h2>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Tên đăng nhập *</label>
                    <input type="text" id="username" placeholder="VD: nguyen_van_a" required autocomplete="username" />
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="VD: email@gmail.com" required autocomplete="email" />
                </div>

                <div class="form-group">
                    <label>Mật khẩu *</label>
                    <input type="password" id="password" placeholder="Ít nhất 6 ký tự" required autocomplete="new-password" />
                </div>

                <div class="form-group">
                    <label>Xác nhận mật khẩu *</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required autocomplete="new-password" />
                </div>

                <div class="form-actions" style="margin-top: 24px;">
                    <button type="submit" class="btn" id="btnRegister" style="width: 100%;">Đăng Ký</button>
                </div>
            </form>

            <div class="auth-footer">
                Đã có tài khoản? <a href="/pages/login.html">Đăng Nhập</a>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>🌸 Loan Spa &copy; 2026</p>
    </footer>

    <script src="/js/api.js"></script>
    <script>
        renderAuthNav();

        function showAlert(type, msg) {
            const el = document.getElementById('alert');
            el.className = 'alert show alert-' + type;
            el.textContent = msg;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { el.className = 'alert'; }, 4000);
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('btnRegister');
            btn.disabled = true;
            btn.textContent = 'Đang đăng ký...';

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Kiem tra mat khau khop
            if (password !== confirmPassword) {
                showAlert('error', '❌ Mật khẩu xác nhận không khớp!');
                btn.disabled = false;
                btn.textContent = 'Đăng Ký';
                return;
            }

            // Kiem tra do dai mat khau
            if (password.length < 6) {
                showAlert('error', '❌ Mật khẩu phải có ít nhất 6 ký tự!');
                btn.disabled = false;
                btn.textContent = 'Đăng Ký';
                return;
            }

            try {
                await callApi('POST', '/api/auth/register', { username, email, password });

                showAlert('success', '✅ Đăng ký thành công! Đang chuyển về đăng nhập...');

                // Chuyen sang trang dang nhap sau 1.5 giay
                setTimeout(() => {
                    window.location.href = '/pages/login.html';
                }, 1500);

            } catch (err) {
                console.error('[Register] loi:', err.message);
                showAlert('error', '❌ ' + err.message);
                btn.disabled = false;
                btn.textContent = 'Đăng Ký';
            }
        }
    </script>

</body>

</html>
